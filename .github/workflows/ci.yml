name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Typecheck
        run: npm run typecheck
      - name: Smoke test production
        if: github.event_name == 'push'
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
        run: |
          if [ -z "$PROD_URL" ]; then echo "PROD_URL not set - skipping smoke test"; exit 0; fi
          echo "Checking $PROD_URL";
          curl -I -s -S "$PROD_URL" | head -n 20
